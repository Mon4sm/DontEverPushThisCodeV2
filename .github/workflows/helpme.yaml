name: DevSecOps Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# TODO#0: Declare workflow permissions.
# SCOPE EXPLANATION: We scope per-workflow to follow the Principle of Least Privilege, 
# ensuring a compromised workflow can't access parts of the repo it doesn't need.
permissions:
  contents: read          # To check out code
  id-token: write         # TODO#0c: Required for OIDC tokens (e.g., for SonarCloud/Cloud auth)
  issues: write           # TODO#0b: Required for Gitleaks/Sonar to comment on issues
  pull-requests: write    # TODO#0b: Required for Gitleaks/Sonar to comment on PRs
  security-events: write  # TODO#0a: Required for SARIF upload to GitHub Security tab
  actions: read           # To read job summaries

jobs:
  # GATE#0: Secret scanning (TruffleHog + Gitleaks)
  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # TODO#1: Secret scanners need full history (0) to find secrets in old commits/history.
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true 
        with:
          path: ./
          # TODO#2: Scan the diff between the default branch and current head
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          # TODO#3: Only report verified secrets to reduce false positive noise
          extra_args: --only-verified

      # TODO#4: Gitleaks step with SARIF and Job Summary
      # Q: Gitleaks (regex) has more false positives. TruffleHog (verified) misses more (unverifiable) keys.
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

  # GATE#1a: SAST via SonarQube 
  sast-scan:
    runs-on: ubuntu-latest
    needs: secret-scanning
    if: ${{ !cancelled() }} 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # TODO#5: Sonar needs full history (0) for "git blame" to detect "new code" authors.
          fetch-depth: 0

      # TODO#6: SonarQube scan step
      # Q: Findings appear in Sonar dashboard because it is a standalone platform 
      # designed for deep code quality metrics that GitHub's Security tab doesn't native support.
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # GATE#1b: SAST via CodeQL
  codeql-scan:
    runs-on: ubuntu-latest
    needs: secret-scanning
    if: ${{ !cancelled() }} 
    strategy:
      matrix:
        # TODO#7: Next.js/React is built on javascript-typescript
        language: [ 'javascript-typescript' ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # TODO#8: Enable both security and quality suites.
          # Difference: security-extended adds more low-severity vulns; 
          # security-and-quality adds maintainability (clean code) rules.
          queries: security-extended,security-and-quality

      # TODO#9: Perform Analysis. 
      # If two languages share a category, their results overwrite each other in the UI.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # GATE#2: Dependency scanning via OWASP Dependency-Check
  dependency-scanning:
    runs-on: ubuntu-latest
    needs: [sast-scan, secret-scanning]
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # TODO#10: Set up Node environment
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # TODO#11: Install deps so scanner can see the dependency tree
      - name: Install dependencies
        run: npm install

      - name: Depcheck
        uses: dependency-check/Dependency-Check_Action@main
        id: Depcheck
        continue-on-error: true
        with:
          project: 'DontEverPushThisCodeV2'
          path: '.' 
          # TODO#12: SARIF format for GitHub integration
          format: 'SARIF'
          out: 'reports'
          # TODO#13: CVSS 7.0 separates MEDIUM (4.0-6.9) from HIGH (7.0-8.9)
          args: >
            --failOnCVSS 7
            --enableRetired

      # TODO#14: Upload to Security tab
      - name: Upload Depcheck SARIF to Security tab
        if: always() 
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: dependency-check

      # TODO#15: Upload raw report as workflow artifact
      - name: Upload Depcheck HTML report
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: depcheck-report
          path: reports/

  # GATE#3: Container/Image scanning via Trivy
  image-scanning:
    runs-on: ubuntu-latest
    needs: [dependency-scanning]
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # TODO#16: Build image
      - name: Build Docker image
        run: docker build -t my-app:latest .

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: 'my-app:latest'
          # TODO#17: Output format
          format: 'sarif'
          output: 'trivy-results.sarif'
          # TODO#18: Severities to report
          # Q: LOW/MEDIUM usually shouldn't block builds to avoid developer fatigue.
          severity: 'HIGH,CRITICAL'
          # TODO#19: Report only CVEs with a fix available
          ignore-unfixed: true

      # TODO#20: Upload to Security tab
      - name: Upload Trivy SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy

      # TODO#21: Upload as artifact
      - name: Upload Trivy results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif
